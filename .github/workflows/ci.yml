name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t url-shortener:test .

      - name: Run flake8 and Django tests
        run: docker run --rm url-shortener:test
